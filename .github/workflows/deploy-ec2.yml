name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy project files to EC2
        run: |
          rsync -avz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.env' \
            --exclude='*.pyc' \
            -e "ssh -i ~/.ssh/deploy_key.pem -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/app/
          echo "✅ Files copied successfully"

      - name: Verify files on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "ls -la ~/app/ && echo '✅ Files exist on EC2'"

      - name: Deploy with Docker Compose on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

            set -e  # Stop on any error

            cd ~/app

            echo "📁 Files in ~/app:"
            ls -la

            echo "🐳 Stopping existing containers..."
            sudo docker compose -f docker-compose.yml down --remove-orphans || true

            echo "🔨 Building images..."
            sudo docker compose -f docker-compose.yml build --no-cache

            echo "🚀 Starting containers..."
            sudo docker compose -f docker-compose.yml up -d

            echo "🧹 Cleaning up..."
            sudo docker system prune -f

            echo "✅ Deployment complete!"
            sudo docker compose -f docker-compose.yml ps
          EOF

      - name: Health check
        run: |
          sleep 15
          curl -f http://${{ secrets.EC2_HOST }} && echo "✅ Site is up!" || echo "⚠️ Site not responding yet"
